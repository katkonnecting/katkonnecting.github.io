{{ define "main" }}
<article>
    <h1>{{ .Title }}</h1>
    
    <ul class="posts">
        {{ range .Pages }}
        <li>
            <a href="{{ .Permalink }}">{{ .Title }}</a>
            <div class="date">{{ .Date.Format "Jan 2, 2006" }}</div>
        </li>
        {{ end }}
    </ul>
</article>
{{ end }}

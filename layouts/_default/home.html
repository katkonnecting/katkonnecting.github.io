{{ define "main" }}
<article>
    <h1>Welcome to {{ .Site.Title }}</h1>
    <p>{{ .Site.Params.description }}</p>
    
    <h2>Latest Posts</h2>
    <ul class="posts">
        {{ range first 10 (where .Site.RegularPages "Section" "blog") }}
        <li>
            <a href="{{ .Permalink }}">{{ .Title }}</a>
            <div class="date">{{ .Date.Format "Jan 2, 2006" }}</div>
        </li>
        {{ end }}
    </ul>
    
    <p style="margin-top: 2rem;">
        <a href="/blog/" style="text-decoration: none; color: #0066cc;">View all posts →</a>
    </p>
</article>
{{ end }}

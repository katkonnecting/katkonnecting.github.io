<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title | default .Site.Title }}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #fafafa;
        }
        
        header {
            background-color: #fff;
            border-bottom: 1px solid #eee;
            padding: 1rem 0;
            margin-bottom: 2rem;
        }
        
        nav {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        h1 {
            font-size: 1.5rem;
        }
        
        nav ul {
            list-style: none;
            display: flex;
            gap: 2rem;
        }
        
        nav a {
            text-decoration: none;
            color: #666;
            transition: color 0.3s;
        }
        
        nav a:hover {
            color: #000;
        }
        
        main {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 1rem;
        }
        
        article {
            background: #fff;
            padding: 2rem;
            border-radius: 4px;
            margin-bottom: 2rem;
        }
        
        article h1 {
            margin-bottom: 0.5rem;
            font-size: 2rem;
        }
        
        .meta {
            color: #999;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }
        
        .tags {
            margin-top: 1rem;
        }
        
        .tag {
            display: inline-block;
            background-color: #eee;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            margin-right: 0.5rem;
            font-size: 0.85rem;
            text-decoration: none;
            color: #666;
        }
        
        .tag:hover {
            background-color: #ddd;
        }
        
        h2 {
            margin-top: 1.5rem;
            margin-bottom: 0.5rem;
        }
        
        code {
            background-color: #f4f4f4;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
        }
        
        pre {
            background-color: #f4f4f4;
            padding: 1rem;
            border-radius: 4px;
            overflow-x: auto;
            margin: 1rem 0;
        }
        
        pre code {
            background: none;
            padding: 0;
        }
        
        .posts {
            list-style: none;
        }
        
        .posts li {
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #eee;
        }
        
        .posts li:last-child {
            border-bottom: none;
        }
        
        .posts a {
            text-decoration: none;
            color: #0066cc;
            font-size: 1.1rem;
        }
        
        .posts a:hover {
            text-decoration: underline;
        }
        
        .date {
            color: #999;
            font-size: 0.9rem;
        }
        
        footer {
            text-align: center;
            padding: 2rem 1rem;
            color: #999;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <h1><a href="/" style="text-decoration: none; color: inherit;">{{ .Site.Title }}</a></h1>
            <ul>
                {{ range .Site.Menus.main }}
                <li><a href="{{ .URL }}">{{ .Name }}</a></li>
                {{ end }}
            </ul>
        </nav>
    </header>
    
    <main>
        {{ block "main" . }}{{ end }}
    </main>
    
    <footer>
        <p>&copy; 2026 {{ .Site.Params.author }}. All rights reserved.</p>
    </footer>
</body>
</html>

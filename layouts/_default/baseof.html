<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title | default .Site.Title }}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            color: #d0d0d0;
            background: linear-gradient(135deg, #0f0f1e 0%, #1a0f2e 50%, #0f1a2e 100%);
            background-attachment: fixed;
            min-height: 100vh;
        }
        
        header {
            background-color: rgba(15, 15, 30, 0.8);
            border-bottom: 1px solid rgba(138, 43, 226, 0.3);
            padding: 1rem 0;
            margin-bottom: 2rem;
            backdrop-filter: blur(10px);
        }
        
        nav {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        h1 {
            font-size: 1.5rem;
            color: #9d4edd;
            font-weight: 600;
        }
        
        nav ul {
            list-style: none;
            display: flex;
            gap: 2rem;
        }
        
        nav a {
            text-decoration: none;
            color: #b0a0d0;
            transition: color 0.3s, text-shadow 0.3s;
            font-weight: 500;
        }
        
        nav a:hover {
            color: #9d4edd;
            text-shadow: 0 0 10px rgba(157, 78, 221, 0.5);
        }
        
        main {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 1rem;
        }
        
        article {
            background: rgba(20, 20, 40, 0.7);
            padding: 2rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            border-left: 3px solid #9d4edd;
            backdrop-filter: blur(5px);
            box-shadow: 0 8px 32px rgba(157, 78, 221, 0.15);
        }
        
        article h1 {
            margin-bottom: 0.5rem;
            font-size: 2rem;
            color: #e0aaff;
        }
        
        .meta {
            color: #8a7aa0;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }
        
        .tags {
            margin-top: 1rem;
        }
        
        .tag {
            display: inline-block;
            background: linear-gradient(135deg, rgba(157, 78, 221, 0.3), rgba(138, 43, 226, 0.2));
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            margin-right: 0.5rem;
            font-size: 0.85rem;
            text-decoration: none;
            color: #b0a0d0;
            border: 1px solid rgba(157, 78, 221, 0.5);
            transition: all 0.3s;
        }
        
        .tag:hover {
            background: linear-gradient(135deg, rgba(157, 78, 221, 0.5), rgba(138, 43, 226, 0.4));
            color: #e0aaff;
            box-shadow: 0 0 10px rgba(157, 78, 221, 0.3);
        }
        
        h2 {
            margin-top: 1.5rem;
            margin-bottom: 0.5rem;
            color: #c77dff;
        }
        
        code {
            background-color: rgba(50, 30, 80, 0.5);
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            color: #b0a0d0;
        }
        
        pre {
            background-color: rgba(15, 10, 30, 0.8);
            padding: 1rem;
            border-radius: 4px;
            overflow-x: auto;
            margin: 1rem 0;
            border: 1px solid rgba(157, 78, 221, 0.2);
        }
        
        pre code {
            background: none;
            padding: 0;
            color: #b0a0d0;
        }
        
        .posts {
            list-style: none;
        }
        
        .posts li {
            margin-bottom: 1.5rem;
            padding: 1rem;
            border-bottom: 1px solid rgba(157, 78, 221, 0.2);
            background: rgba(20, 20, 40, 0.5);
            border-radius: 6px;
            transition: all 0.3s;
        }
        
        .posts li:hover {
            background: rgba(30, 20, 50, 0.7);
            border-left: 3px solid #9d4edd;
            padding-left: 1.3rem;
        }
        
        .posts li:last-child {
            border-bottom: none;
        }
        
        .posts a {
            text-decoration: none;
            color: #c77dff;
            font-size: 1.1rem;
            font-weight: 500;
            transition: color 0.3s;
        }
        
        .posts a:hover {
            color: #e0aaff;
            text-shadow: 0 0 10px rgba(192, 125, 255, 0.3);
        }
        
        .date {
            color: #8a7aa0;
            font-size: 0.9rem;
        }
        
        footer {
            text-align: center;
            padding: 2rem 1rem;
            color: #8a7aa0;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <h1><a href="/" style="text-decoration: none; color: inherit;">{{ .Site.Title }}</a></h1>
            <ul>
                {{ range .Site.Menus.main }}
                <li><a href="{{ .URL }}">{{ .Name }}</a></li>
                {{ end }}
            </ul>
        </nav>
    </header>
    
    <main>
        {{ block "main" . }}{{ end }}
    </main>
    
    <footer>
        <p>&copy; 2026 {{ .Site.Params.author }}. All rights reserved.</p>
    </footer>
</body>
</html>

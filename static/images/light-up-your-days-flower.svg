    <linearGradient id="petal" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff7c8"/>
      <stop offset=".45" stop-color="#f7b267"/>
      <stop offset="1" stop-color="#9d4edd"/>
    </linearGradient>
    <filter id="soft">

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Glowing flower</title>
  <desc id="desc">A luminous flower over a warm dark background for the poem I Light Up Your Days.</desc>
  <defs>
    <radialGradient id="glow" cx="66%" cy="38%" r="54%">
      <stop offset="0" stop-color="#fff4b8" stop-opacity=".9"/>
      <stop offset=".34" stop-color="#c77dff" stop-opacity=".34"/>
      <stop offset=".72" stop-color="#1a0f2e" stop-opacity=".82"/>
      <stop offset="1" stop-color="#0f0f1e"/>
